<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sheira ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    overflow-x:hidden;
    text-align:center;
}

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

img{
    width:250px;
    max-width:80%;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    margin-bottom:20px;
}

h1{
    color:white;
    font-size:2rem;
    text-shadow:2px 2px 10px rgba(0,0,0,.3);
}

p{
    color:white;
    margin-top:15px;
    font-size:1.1rem;
    max-width:700px;
}

button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:1rem;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.hearts{
    position:fixed;
    top:-20px;
    color:red;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="hero">
    <img src="sheira.jpg" alt="Sheira">

    <h1>Happy Birthday, Dhiajeng Ansheira Ayunne Bummy ❤️</h1>

    <p>
        Selamat ulang tahun yaa 🎉<br><br>
        Semoga panjang umur, sehat selalu,
        dimudahkan semua urusannya,
        dan semua impian yang diinginkan bisa tercapai.
        Tetap jadi pribadi yang baik, ceria,
        dan selalu membawa kebahagiaan untuk orang-orang di sekitar.
        ❤️
    </p>

    <button onclick="playMusic()">Klik Aku 🎵</button>
</div>

<audio id="musik" loop>
    <source src="Semua_Aku_Dirayakan.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic(){
    document.getElementById("musik").play();
    alert("Selamat Ulang Tahun Sheira ❤️");
}

function createHeart(){
    const heart=document.createElement("div");
    heart.innerHTML="❤️";
    heart.classList.add("hearts");

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    heart.style.animationDuration=(Math.random()*4+4)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
